name: Run Claude CLI
# WRONG: on: [push] (Will throw Unsupported event type error)

# CORRECT: Use pull requests or comments
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-cli-job:
    # Ensure Claude can read/write to the PR or Issue
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write  # Required for OIDC authentication if used
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The prompt is optional if you trigger via @claude comments
          prompt: "Review the recent changes in this pull request." 
