name: Claude PR Review

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request for security issues. Focus on:
            - Injection flaws (SQL, command, template) and unsafe input handling
            - Authentication / authorization mistakes
            - Hardcoded secrets or credentials leaking into logs
            - Sensitive data exposure and unsafe error handling
            Post concise, actionable inline feedback on the changed lines only.
          show_full_output: true
          claude_args: "--output-format json --json-schema schemas/review-schema.json"
